name: Windows Desktop Package

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/windows-desktop-package.yml"
      - "apps/**"
      - "packages/**"
      - "scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"

jobs:
  package-windows:
    name: Build Windows NSIS package
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npx pnpm@9.15.4 install --frozen-lockfile

      - name: Run unit tests
        run: npx pnpm@9.15.4 test

      - name: Build web app
        run: npx pnpm@9.15.4 build

      - name: Verify Windows local web mode
        shell: pwsh
        run: |
          $workspace = $env:GITHUB_WORKSPACE
          $job = Start-Job -ScriptBlock {
            Set-Location $using:workspace
            npx pnpm@9.15.4 dev
          }

          try {
            $healthOk = $false
            $webOk = $false

            for ($i = 0; $i -lt 60; $i++) {
              try {
                $health = Invoke-RestMethod -Uri "http://127.0.0.1:5174/health" -TimeoutSec 3
                if ($health.ok -eq $true) {
                  $healthOk = $true
                }
              } catch {}

              try {
                $web = Invoke-WebRequest -Uri "http://127.0.0.1:5173/" -TimeoutSec 3
                if ($web.StatusCode -eq 200 -and $web.Content.Contains('<div id="root"></div>')) {
                  $webOk = $true
                }
              } catch {}

              if ($healthOk -and $webOk) {
                break
              }

              Start-Sleep -Seconds 2
            }

            if (-not $healthOk) {
              throw "API health endpoint did not become available on Windows."
            }

            if (-not $webOk) {
              throw "Vite web shell did not become available on Windows."
            }
          } finally {
            Stop-Job $job -ErrorAction SilentlyContinue
            Receive-Job $job -ErrorAction SilentlyContinue
            Remove-Job $job -Force -ErrorAction SilentlyContinue
          }

      - name: Check desktop packaging config
        run: npx pnpm@9.15.4 desktop:check

      - name: Build Windows NSIS installer
        run: npx pnpm@9.15.4 desktop:build:win

      - name: Create Windows verification kit
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "apps/web/src-tauri/target/release/bundle/nsis" -Filter "*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $installer) {
            throw "Windows NSIS installer was not found."
          }

          New-Item -ItemType Directory -Path "windows-verification-kit" -Force | Out-Null

          $hash = (Get-FileHash -Path $installer.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          $manifest = [ordered]@{
            generatedAt = (Get-Date).ToUniversalTime().ToString("o")
            headSha = $env:GITHUB_SHA
            installerName = $installer.Name
            installerPath = $installer.FullName
            sizeBytes = $installer.Length
            sha256 = $hash
            requiredRuntimeChecks = @(
              "Desktop runtime diagnostics",
              "SQLite path",
              "Baidu Cloud sync folder",
              "file picker",
              "audio playback",
              "PDF viewing"
            )
          }

          $manifest | ConvertTo-Json -Depth 4 | Set-Content -Encoding utf8 "windows-verification-kit/windows-package-manifest.json"
          Copy-Item "scripts/windows-packaged-runtime-check.ps1" "windows-verification-kit/windows-packaged-runtime-check.ps1"

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: ielts-local-practice-windows-nsis
          path: apps/web/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload Windows verification kit
        uses: actions/upload-artifact@v4
        with:
          name: ielts-local-practice-windows-verification-kit
          path: windows-verification-kit/*
          if-no-files-found: error

      - name: Verify Windows packaged runtime install
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "apps/web/src-tauri/target/release/bundle/nsis" -Filter "*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $installer) {
            throw "Windows NSIS installer was not found."
          }

          $installProcess = Start-Process -FilePath $installer.FullName -ArgumentList "/S" -Wait -PassThru
          if ($installProcess.ExitCode -ne 0) {
            throw "Windows NSIS installer failed with exit code $($installProcess.ExitCode)."
          }

          Start-Sleep -Seconds 10

          ./scripts/windows-packaged-runtime-check.ps1 `
            -ManifestPath "windows-verification-kit/windows-package-manifest.json" `
            -InstallerPath $installer.FullName `
            -RequireInstalledApp `
            -SkipLaunch
